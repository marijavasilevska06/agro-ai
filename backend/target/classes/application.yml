spring:
  datasource:
    url: jdbc:h2:file:./data/agrodb;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: 8080

app:
  jwt-secret: "change-this-secret-key-for-prod-change-this-secret-key"
  jwt-expiration-ms: 86400000
